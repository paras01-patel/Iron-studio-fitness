{% extends "base2.html" %}

{% block content %}

<div class="container py-5">

    <h1 class="text-danger mb-4">
        All Reports
    </h1>

    <div class="table-responsive">
    <div style="
    display:flex;
    gap:10px;
    margin-bottom:10px;
">

    <input type="text"
            placeholder="Search here"
            style="
                width:250px;
                padding:10px;
                border:1px solid gray;
                border-radius:5px;
            ">

    <button style="
        background-color:red;
        color:white;
        padding:10px 20px;
        border:none;
        border-radius:5px;
        cursor:pointer;
    ">
        Search
    </button>

</div>

    <table class="table table-dark table-bordered table-hover"
            style="
                border-radius:15px;
                overflow:hidden;
            ">

        <thead class="table-danger">

            <tr>
                <th>id</th>
                <th>name</th> 
                <th>email</th>
                <th>phone </th>
                <th>age </th>
                <th>plan</th>
                <th>trainer</th>
                <th>goal</th>
                <th>message</th>
            </tr>

        </thead>

        <tbody>

            {% for i in data %}
            <tr>

                <td>{{ i.id }}</td>
                <td>{{ i.name }}</td>
                <td>{{ i.email }}</td>
                <td>{{ i.phone }}</td>
                <td>{{ i.age}}</td>
                <td>{{ i.plan }}</td>
                <td>{{ i.trainer }}</td>
                <td>{{ i.goal }}</td>                
                <td>{{ i.message }}</td>

            </tr>
            {% endfor %}

        </tbody>

    </table>

</div>

{% endblock content %}
